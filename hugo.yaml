baseURL: "https://blog.theopnv.com"
title: Blog - theopnv.com
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 5

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Blog
  description: "Theo Penavaire's blog"
  keywords: [Blog, Portfolio, PaperMod]
  author: "Theo Penavaire"
  images: ["/preview.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  assets:
    favicon: "/preview.png" # used as Organization/publisher logo in schema.org JSON-LD

  schema:
    sameAs:
      - "https://github.com/theo-pnv"
      - "https://theopnv.com/"

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  label:
    text: "Blog"


  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page

menu:
  main:
    - identifier: newsletter
      name: Newsletter
      pageRef: newsletter
      weight: 10
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: about
      name: About
      url: https://theopnv.com/
      weight: 50

defaultContentLanguage: en
defaultContentLanguageInSubdir: false
disableDefaultLanguageRedirect: false
languages:
  fr:
    languageCode: fr-FR
    languageName: Français
    params:
      footer:
        text: "Écrit par [Theo Penavaire](/about/)."
  en:
    languageCode: en-US
    languageName: English
    params:
      footer:
        text: "Written by [Theo Penavaire](/about/)."